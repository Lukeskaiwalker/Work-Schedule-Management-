name: Release On Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-on-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      RELEASE_USERNAME: ${{ vars.RELEASE_USERNAME != '' && vars.RELEASE_USERNAME || github.repository_owner }}
      # Token fallback chain (added in v2.4.6):
      #   1. RELEASE_TOKEN (PAT) — releases attributed to the human;
      #      preferred path because the release author shows the user's
      #      GitHub username instead of github-actions[bot].
      #   2. GITHUB_TOKEN — auto-issued by Actions every run, never
      #      expires, always carries the permissions declared above
      #      (`contents: write`). Used automatically when RELEASE_TOKEN
      #      is missing or empty so a stale PAT never blocks a release
      #      the way it did between v2.3.6 and v2.3.7.
      GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Determine next release tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          semver_pattern='^v[0-9]+\.[0-9]+\.[0-9]+$'
          head_tag="$(git tag --points-at "${GITHUB_SHA}" | grep -E "${semver_pattern}" | head -n1 || true)"

          if [[ -n "${head_tag}" ]]; then
            if gh release view "${head_tag}" >/dev/null 2>&1; then
              echo "skip=true" >> "${GITHUB_OUTPUT}"
              echo "reason=head already has published release ${head_tag}" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            echo "skip=false" >> "${GITHUB_OUTPUT}"
            echo "tag=${head_tag}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          latest_tag="$(git tag --sort=-v:refname | grep -E "${semver_pattern}" | head -n1 || true)"
          if [[ -z "${latest_tag}" ]]; then
            next_tag="v1.0.0"
          else
            latest_commit="$(git rev-list -n1 "${latest_tag}")"
            if [[ "${latest_commit}" == "${GITHUB_SHA}" ]]; then
              echo "skip=true" >> "${GITHUB_OUTPUT}"
              echo "reason=head matches latest released commit ${latest_tag}" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "${version}"
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi

          echo "skip=false" >> "${GITHUB_OUTPUT}"
          echo "tag=${next_tag}" >> "${GITHUB_OUTPUT}"

      - name: Configure git identity
        if: steps.version.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "${RELEASE_USERNAME}"
          git config user.email "${RELEASE_USERNAME}@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Create and push tag
        if: steps.version.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.version.outputs.tag }}"
          if ! git rev-parse "${tag}" >/dev/null 2>&1; then
            git tag "${tag}" "${GITHUB_SHA}"
          fi

          if ! git ls-remote --tags origin "refs/tags/${tag}" | grep -q "${tag}$"; then
            git push origin "refs/tags/${tag}"
          fi

      - name: Build sanitized release bundle
        if: steps.version.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/build_release_bundle.sh "${{ steps.version.outputs.tag }}" "dist/SMPL-${{ steps.version.outputs.tag }}.tar.gz"

      - name: Publish GitHub release
        if: steps.version.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.version.outputs.tag }}"
          asset="dist/SMPL-${tag}.tar.gz"
          checksum="${asset}.sha256"

          gh release create "${tag}" \
            "${asset}#SMPL ${tag} bundle" \
            "${checksum}#SMPL ${tag} SHA-256" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${tag}" \
            --verify-tag \
            --generate-notes \
            --latest

      - name: Report skip reason
        if: steps.version.outputs.skip == 'true'
        run: echo "${{ steps.version.outputs.reason }}"
