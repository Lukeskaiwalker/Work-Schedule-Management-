[pytest]
# Make `from app.xxx import …` work without requiring PYTHONPATH=. at the shell.
# pytest adds these directories to sys.path before collecting tests.
pythonpath = .

# Test discovery scope.
testpaths = tests

# Short traceback + quiet reporting by default; pass -vv locally for detail.
addopts = --tb=short -q

# Silence the two noisy third-party DeprecationWarnings (passlib → crypt,
# reportlab → ast.NameConstant). Keep all project-owned warnings visible.
filterwarnings =
    ignore::DeprecationWarning:passlib.*
    ignore::DeprecationWarning:reportlab.*
