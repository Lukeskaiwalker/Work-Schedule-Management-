server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Hashed build artefacts (Vite emits content-hashed filenames like
  # index-DywOrsgb.css and chunks/TimePage-Dbaq7pAM.js). A new content
  # = a new filename, so it's safe to cache these forever and mark
  # them immutable — the browser will never need to revalidate.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }
  location /chunks/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # index.html is the entry point that references the hashed asset
  # filenames. It MUST NOT be cached — otherwise a deploy can leave
  # browsers pointing at ghost filenames for the length of the cache.
  # `no-cache` means "always revalidate with the server" (not "don't
  # store"), so the round-trip stays cheap via 304s.
  location = /index.html {
    add_header Cache-Control "no-cache" always;
    try_files $uri =404;
  }

  # Service worker: must revalidate on every request so push-handling
  # fixes propagate immediately, even on long-running PWA sessions.
  location = /sw.js {
    add_header Cache-Control "no-cache" always;
    try_files $uri =404;
  }

  # SPA fallback: anything not matched above falls through to index.html
  # so client-side routes like /admin, /time, /planning resolve correctly.
  location / {
    try_files $uri /index.html;
  }
}
