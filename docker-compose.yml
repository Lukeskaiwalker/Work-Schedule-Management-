services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: smpl
      POSTGRES_USER: smpl
      POSTGRES_PASSWORD: smpl
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smpl -d smpl"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      # Forward release metadata as build args so the api Dockerfile can bake
      # it into /app/.release.env when the host's .release.env is missing or
      # empty. safe_update.sh sources .release.env before `docker compose
      # build api`, putting these vars in scope. Without this, prod can end
      # up with an api image that has no release metadata at all (Compose
      # silently skips `path:/required:` long-form env_file on versions
      # below 2.24).
      args:
        APP_RELEASE_VERSION: ${APP_RELEASE_VERSION:-}
        APP_RELEASE_COMMIT: ${APP_RELEASE_COMMIT:-}
    restart: unless-stopped
    # v2.5.6: cgroup memory ceiling. Without this, kernel-level OOM
    # (from competing host processes — observed on this host around
    # 22:20 UTC nightly when dpkg-db-backup + mintupdate-automation-
    # upgrade timers fire) picks the largest user-space process as
    # its victim, which on this stack is consistently the api
    # workers. The kill happens OUTSIDE Docker's cgroup OOM tracking,
    # so the daemon misses the OOMKilled signal AND the
    # restart-policy doesn't fire — operator finds the api dead
    # the next morning with no restart attempt.
    #
    # With mem_limit, the kernel kills inside the api cgroup ONLY
    # when this container exceeds 1.5GB. Docker tracks that as
    # OOMKilled=true, restart: unless-stopped fires, and the api
    # comes back automatically. 1.5GB is well above steady-state
    # (typically ~300-500MB for 2 uvicorn workers + uploads
    # cache) but leaves room for occasional spikes (PDF reports,
    # large project lookups).
    mem_limit: 1500m
    # Match memswap_limit to mem_limit so the container cannot
    # spill into host swap and prolong the unhealthy state. Without
    # this, Docker defaults to mem_limit*2 of swap, which would let
    # the api thrash for many seconds before being killed.
    memswap_limit: 1500m
    env_file:
      # Layering order matters: .env.example provides defaults (committed,
      # schema-only — every value is empty/placeholder), .env provides the
      # real secrets and runtime config (gitignored — see .gitignore lines
      # 49-50), .release.env is build-time metadata. Compose merges in order,
      # so later files override earlier ones. required:true on .env means a
      # missing file is a hard fail at compose-up time — which is what we
      # want: silent fallback to placeholder values is how SECRET_KEY ended
      # up as "replace-with-long-random-secret" in prod for months.
      - ./apps/api/.env.example
      - path: ./apps/api/.env
        required: true
      - path: ./apps/api/.release.env
        required: false
    volumes:
      - uploads_data:/data/uploads
      - "./local wiki:/data/wiki:ro"
      - "./Datanorm_Neuanlage:/data/Datanorm_Neuanlage:ro"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy

  api_worker:
    build:
      context: ./apps/api
      # Mirror the api service so the worker image has the same release
      # metadata baked in (relevant for any release-aware code paths the
      # worker may exercise).
      args:
        APP_RELEASE_VERSION: ${APP_RELEASE_VERSION:-}
        APP_RELEASE_COMMIT: ${APP_RELEASE_COMMIT:-}
    restart: unless-stopped
    # v2.5.6: see the matching block on the api service above for the
    # full rationale. The worker is smaller (single process, no
    # uvicorn fan-out) but handles PDF-conversion + OpenAI extraction
    # jobs that can transiently push memory up. 1GB is plenty;
    # observed steady-state is ~150-250MB.
    mem_limit: 1000m
    memswap_limit: 1000m
    command: ["python", "-m", "app.worker"]
    # See env_file layering rationale on the api service above. Worker shares
    # the same env layout because it runs the same Python app code paths.
    env_file:
      - ./apps/api/.env.example
      - path: ./apps/api/.env
        required: true
      - path: ./apps/api/.release.env
        required: false
    volumes:
      - uploads_data:/data/uploads
      - "./local wiki:/data/wiki:ro"
      - "./Datanorm_Neuanlage:/data/Datanorm_Neuanlage:ro"
    depends_on:
      api:
        condition: service_healthy

  # Single container that serves the SPA, reverse-proxies /api/*, and renders
  # a maintenance page when ./infra/maintenance/.flag exists. Replaces the
  # older "web (nginx)" + "caddy" two-container split. See apps/web/Caddyfile
  # for the routing config.
  web:
    build:
      context: ./apps/web
    restart: unless-stopped
    ports:
      # SMPL_CADDY_* names preserved for backward compatibility with prod's
      # existing .env. In production these usually map to 8080/8443 because
      # Traefik owns 80/443 at the host level.
      - "${SMPL_CADDY_HTTP_PORT:-80}:80"
      - "${SMPL_CADDY_HTTPS_PORT:-443}:443"
    volumes:
      # Maintenance assets read-only mount. Caddy checks for .flag at request
      # time, so safe_update.sh can toggle maintenance instantly without any
      # reload or container restart.
      - ./infra/maintenance:/srv/maintenance:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      api:
        condition: service_healthy

  # Sidecar that owns docker-socket access for orchestrating updates. The api
  # container delegates "real" install runs to this service via internal HTTP,
  # which lets safe_update.sh restart the api/web/caddy stack without the
  # api restarting itself mid-request. No host ports are exposed: the runner
  # is reachable only on the docker default network.
  update_runner:
    build:
      context: ./apps/update_runner
    restart: unless-stopped
    environment:
      UPDATE_RUNNER_REPO_ROOT: /repo
      UPDATE_RUNNER_LOG_DIR: /var/log/update_runner
      UPDATE_RUNNER_TOKEN: ${UPDATE_RUNNER_TOKEN:-}
      # Force the project name so docker compose targets the running stack
      # instead of deriving a separate project from the /repo bind mount path.
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-smplall}
      # Forwarded so the runner can invoke ./scripts/backup.sh successfully.
      BACKUP_PASSPHRASE: ${BACKUP_PASSPHRASE:-}
      BACKUP_PASSPHRASE_FILE: ${BACKUP_PASSPHRASE_FILE:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/repo
      - update_runner_logs:/var/log/update_runner
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pg_data:
  uploads_data:
  caddy_data:
  caddy_config:
  update_runner_logs:
