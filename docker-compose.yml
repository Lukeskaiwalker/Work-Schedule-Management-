services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: smpl
      POSTGRES_USER: smpl
      POSTGRES_PASSWORD: smpl
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smpl -d smpl"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env.example
      - path: ./apps/api/.release.env
        required: false
    volumes:
      - uploads_data:/data/uploads
      - "./local wiki:/data/wiki:ro"
      - "./Datanorm_Neuanlage:/data/Datanorm_Neuanlage:ro"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy

  api_worker:
    build:
      context: ./apps/api
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    env_file:
      - ./apps/api/.env.example
      - path: ./apps/api/.release.env
        required: false
    volumes:
      - uploads_data:/data/uploads
      - "./local wiki:/data/wiki:ro"
      - "./Datanorm_Neuanlage:/data/Datanorm_Neuanlage:ro"
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      api:
        condition: service_healthy

  caddy:
    image: caddy:2.10.2-alpine
    restart: unless-stopped
    ports:
      - "${SMPL_CADDY_HTTP_PORT:-80}:80"
      - "${SMPL_CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  pg_data:
  uploads_data:
  caddy_data:
  caddy_config:
